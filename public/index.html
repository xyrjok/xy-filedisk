<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极速云盘下载</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: white; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .gradient-text {
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6 relative overflow-hidden">
    <div class="absolute top-0 left-0 w-96 h-96 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-blob"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-blob animation-delay-2000"></div>

    <div class="glass-panel w-full max-w-lg rounded-3xl p-10 z-10 text-center space-y-8">
        <div>
            <h1 class="text-4xl font-bold tracking-tight mb-2">文件<span class="gradient-text">直连下载</span></h1>
            <p class="text-slate-400 text-sm">多节点负载均衡 · 无限速 · 302 Direct</p>
        </div>

        <div class="space-y-4">
            <div class="relative">
                <input id="fileId" type="text" placeholder="输入阿里云盘 File ID" 
                    class="w-full bg-slate-800/50 border border-slate-600 rounded-xl px-5 py-4 outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all text-center tracking-wider placeholder-slate-500 text-white">
            </div>
            
            <button onclick="startDownload()" 
                class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-semibold py-4 rounded-xl shadow-lg shadow-blue-500/30 transition-all transform active:scale-[0.98]">
                立即下载文件
            </button>
        </div>

        <div class="pt-6 border-t border-slate-700/50 flex justify-between text-xs text-slate-500">
            <span>Server Status: <span class="text-emerald-400">Online</span></span>
            <a href="/admin.html" class="hover:text-blue-400 transition-colors">管理后台</a>
        </div>
    </div>

    <script>
        function startDownload() {
            const id = document.getElementById('fileId').value.trim();
            if (!id) return alert('请输入有效的文件 ID');
            // 按钮动效
            const btn = document.querySelector('button');
            btn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 请求中...`;
            setTimeout(() => {
                window.location.href = `/d?id=${id}`;
                setTimeout(() => btn.innerHTML = '立即下载文件', 2000);
            }, 800);
        }
    </script>
</body>
</html>
