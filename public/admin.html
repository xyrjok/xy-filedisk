<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script> 
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f1f5f9; }
        .sidebar { background: #0f172a; color: white; }
        .file-item:hover { background-color: #f8fafc; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="loginModal" class="fixed inset-0 z-50 bg-slate-900/90 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-8 space-y-6">
            <div class="text-center">
                <h2 class="text-2xl font-bold text-slate-800">管理员登录</h2>
                <p class="text-slate-400 text-sm mt-1">请验证身份以继续</p>
            </div>
            <div class="space-y-4">
                <input id="logUser" type="text" placeholder="账号" class="w-full px-4 py-3 rounded-lg bg-slate-50 border focus:ring-2 focus:ring-blue-500 outline-none">
                <input id="logPass" type="password" placeholder="密码" class="w-full px-4 py-3 rounded-lg bg-slate-50 border focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all">登 录</button>
            </div>
        </div>
    </div>

    <aside class="sidebar w-64 hidden md:flex flex-col transition-all">
        <div class="p-6 text-2xl font-bold tracking-wider flex items-center gap-2">
            <i data-lucide="cloud-lightning" class="text-blue-400"></i> FILEDISK
        </div>
        <nav class="flex-1 px-4 space-y-2 mt-4">
            <a href="#" onclick="switchTab('tokens')" id="nav-tokens" class="nav-item flex items-center gap-3 px-4 py-3 bg-blue-600 rounded-xl text-white shadow-lg shadow-blue-900/50">
                <i data-lucide="key"></i> Token 管理
            </a>
            <a href="#" onclick="switchTab('files')" id="nav-files" class="nav-item flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 rounded-xl transition-all">
                <i data-lucide="folder-open"></i> 网盘浏览
            </a>
            <a href="#" onclick="switchTab('settings')" id="nav-settings" class="nav-item flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-800 rounded-xl transition-all">
                <i data-lucide="settings"></i> 系统设置
            </a>
        </nav>
        <div class="p-4">
            <button onclick="logout()" class="flex items-center gap-2 text-slate-400 hover:text-white px-4 py-2 text-sm transition-colors">
                <i data-lucide="log-out"></i> 退出登录
            </button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 md:p-8 relative">
        
        <div id="tab-tokens" class="max-w-5xl mx-auto space-y-6">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold text-slate-800">Token 池</h1>
                    <p class="text-slate-500 text-sm">系统将从下方列表中随机选择 Token 进行下载</p>
                </div>
                <button onclick="openAddModal()" class="bg-black text-white px-5 py-2.5 rounded-lg hover:bg-slate-800 flex items-center gap-2 shadow-lg transition-all">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i> 添加 Token
                </button>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-200 text-slate-500 text-xs uppercase font-semibold">
                        <tr>
                            <th class="px-6 py-4">ID</th>
                            <th class="px-6 py-4">备注名</th>
                            <th class="px-6 py-4">Refresh Token (预览)</th>
                            <th class="px-6 py-4 text-right">操作</th>
                        </tr>
                    </thead>
                    <tbody id="tokenTable" class="divide-y divide-slate-100 text-sm"></tbody>
                </table>
                <div id="emptyState" class="hidden text-center py-12 text-slate-400">暂无 Token</div>
            </div>
        </div>

        <div id="tab-files" class="hidden max-w-6xl mx-auto space-y-4 h-full flex flex-col">
            <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <div class="flex items-center gap-4">
                    <select id="driveSelect" onchange="changeDrive()" class="bg-slate-100 border-none text-sm font-bold text-slate-700 rounded-lg px-3 py-2 outline-none cursor-pointer">
                        <option value="">加载中...</option>
                    </select>
                    <div id="breadcrumb" class="flex items-center gap-2 text-sm text-slate-500 overflow-hidden">
                        <span class="cursor-pointer hover:text-blue-500" onclick="loadFiles('root')">根目录</span>
                    </div>
                </div>
                <button onclick="refreshFiles()" class="p-2 text-slate-400 hover:text-blue-500 transition-colors"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 flex-1 overflow-hidden flex flex-col">
                <div class="grid grid-cols-12 gap-4 px-6 py-3 bg-slate-50 text-xs font-semibold text-slate-500 border-b border-slate-100">
                    <div class="col-span-8">文件名</div>
                    <div class="col-span-2 text-right">大小</div>
                    <div class="col-span-2 text-right">操作</div>
                </div>
                <div id="fileList" class="overflow-y-auto flex-1 p-2 space-y-1">
                    <div class="text-center py-10 text-slate-400">请选择网盘加载文件...</div>
                </div>
            </div>
        </div>

        <div id="tab-settings" class="hidden max-w-2xl mx-auto">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
                <h2 class="text-xl font-bold mb-6">安全设置</h2>
                <div class="space-y-4">
                    <div><label class="block text-sm font-medium mb-1">新用户名</label><input id="newAdminUser" class="w-full px-4 py-2 border rounded-lg"></div>
                    <div><label class="block text-sm font-medium mb-1">新密码</label><input id="newAdminPass" type="password" class="w-full px-4 py-2 border rounded-lg"></div>
                    <button onclick="updateAdmin()" class="bg-blue-600 text-white px-6 py-2 rounded-lg">保存更改</button>
                </div>
            </div>
        </div>

    </main>

    <div id="tokenModal" class="hidden fixed inset-0 z-40 bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6 space-y-4">
            <h3 id="modalTitle" class="text-lg font-bold">添加新账号</h3>
            <input type="hidden" id="editId">
            <div><label class="text-xs font-semibold text-slate-500">备注名称</label><input id="newTokenName" class="w-full px-4 py-2 border rounded-lg mt-1"></div>
            <div><label class="text-xs font-semibold text-slate-500">Refresh Token</label><textarea id="newTokenVal" rows="4" class="w-full px-4 py-2 border rounded-lg mt-1 font-mono text-xs"></textarea></div>
            <div class="flex justify-end gap-3 pt-2">
                <button onclick="closeModal()" class="px-4 py-2 text-slate-500 hover:bg-slate-100 rounded-lg">取消</button>
                <button onclick="submitToken()" class="px-4 py-2 bg-black text-white rounded-lg hover:bg-slate-800">保存</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let currentDriveId = '';
        let currentParentId = 'root';
        let breadcrumbs = [{id: 'root', name: '根目录'}];

        // 简易鉴权检查
        if (localStorage.getItem('isAuth') === 'true') {
            document.getElementById('loginModal').classList.add('hidden');
            loadTokens();
        }

        async function handleLogin() {
            const u = document.getElementById('logUser').value;
            const p = document.getElementById('logPass').value;
            const res = await fetch('/api/login', { method: 'POST', body: JSON.stringify({username:u, password:p}) });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('isAuth', 'true');
                document.getElementById('loginModal').classList.add('hidden');
                loadTokens();
            } else alert('登录失败');
        }

        function switchTab(tab) {
            ['tokens', 'files', 'settings'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.add('hidden');
                document.getElementById(`nav-${t}`).classList.remove('bg-blue-600', 'text-white', 'shadow-lg');
                document.getElementById(`nav-${t}`).classList.add('text-slate-400', 'hover:bg-slate-800');
            });
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            const nav = document.getElementById(`nav-${tab}`);
            nav.classList.remove('text-slate-400', 'hover:bg-slate-800');
            nav.classList.add('bg-blue-600', 'text-white', 'shadow-lg');

            if (tab === 'files' && !currentDriveId) loadDrives();
        }

        // === Token 逻辑 (省略部分重复代码，只保留核心) ===
        async function loadTokens() {
            const res = await fetch('/api/tokens');
            const data = await res.json();
            const tbody = document.getElementById('tokenTable');
            tbody.innerHTML = '';
            if(data.length===0) document.getElementById('emptyState').classList.remove('hidden');
            else document.getElementById('emptyState').classList.add('hidden');
            data.forEach(t => {
                tbody.innerHTML += `<tr><td class="px-6 py-4 text-xs text-slate-400">#${t.id}</td><td class="px-6 py-4 font-medium">${t.name}</td><td class="px-6 py-4 text-xs text-slate-400">${t.token_preview}</td><td class="px-6 py-4 text-right"><button onclick="delToken(${t.id})" class="text-red-500 hover:bg-red-50 p-2 rounded"><i data-lucide="trash-2" class="w-4 h-4"></i></button></td></tr>`;
            });
            lucide.createIcons();
        }
        function openAddModal() { document.getElementById('tokenModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('tokenModal').classList.add('hidden'); }
        async function submitToken() {
            const name = document.getElementById('newTokenName').value;
            const token = document.getElementById('newTokenVal').value;
            await fetch('/api/tokens', { method: 'POST', body: JSON.stringify({name, token}) });
            closeModal(); loadTokens();
        }
        async function delToken(id) { if(confirm('确认删除?')) await fetch('/api/tokens', {method:'DELETE', body:JSON.stringify({id})}); loadTokens(); }

        // === 网盘浏览逻辑 ===
        async function loadDrives() {
            const sel = document.getElementById('driveSelect');
            sel.innerHTML = '<option>加载中...</option>';
            try {
                const res = await fetch('/api/drives');
                const data = await res.json();
                sel.innerHTML = '';
                if(data.resource_drive_id) sel.innerHTML += `<option value="${data.resource_drive_id}">📦 资源库</option>`;
                if(data.backup_drive_id) sel.innerHTML += `<option value="${data.backup_drive_id}">💾 备份盘</option>`;
                changeDrive();
            } catch(e) { sel.innerHTML = '<option>加载失败</option>'; }
        }

        function changeDrive() {
            currentDriveId = document.getElementById('driveSelect').value;
            currentParentId = 'root';
            breadcrumbs = [{id: 'root', name: '根目录'}];
            renderBreadcrumb();
            loadFiles('root');
        }

        async function loadFiles(parentId, folderName = null) {
            if (folderName) {
                currentParentId = parentId;
                breadcrumbs.push({id: parentId, name: folderName});
                renderBreadcrumb();
            } else if (parentId === 'root') {
                currentParentId = 'root';
                breadcrumbs = [{id: 'root', name: '根目录'}];
                renderBreadcrumb();
            }

            const listDiv = document.getElementById('fileList');
            listDiv.innerHTML = '<div class="text-center py-10"><i class="animate-spin" data-lucide="loader-2"></i> 加载中...</div>';
            lucide.createIcons();

            try {
                const res = await fetch('/api/list', {
                    method: 'POST', body: JSON.stringify({ drive_id: currentDriveId, parent_file_id: parentId })
                });
                const data = await res.json();
                listDiv.innerHTML = '';

                if (!data.items || data.items.length === 0) {
                    listDiv.innerHTML = '<div class="text-center py-10 text-slate-400">此文件夹为空</div>';
                    return;
                }

                data.items.forEach(item => {
                    const isFolder = item.type === 'folder';
                    const icon = isFolder ? 'folder' : 'file';
                    const iconColor = isFolder ? 'text-yellow-500 fill-yellow-500' : 'text-blue-400';
                    const size = isFolder ? '-' : formatSize(item.size);
                    const action = isFolder 
                        ? `onclick="loadFiles('${item.file_id}', '${item.name}')"`
                        : `onclick="copyFileId('${item.file_id}', '${item.name}')"`;

                    const div = document.createElement('div');
                    div.className = 'grid grid-cols-12 gap-4 px-4 py-3 rounded-lg hover:bg-slate-50 cursor-pointer items-center transition-colors group';
                    div.innerHTML = `
                        <div class="col-span-8 flex items-center gap-3 overflow-hidden" ${action}>
                            <i data-lucide="${icon}" class="w-5 h-5 ${iconColor} flex-shrink-0"></i>
                            <span class="truncate text-sm text-slate-700 font-medium">${item.name}</span>
                        </div>
                        <div class="col-span-2 text-right text-xs text-slate-400 font-mono">${size}</div>
                        <div class="col-span-2 text-right">
                            ${!isFolder ? `
                            <button onclick="copyFileId('${item.file_id}')" class="text-blue-500 hover:bg-blue-100 p-1.5 rounded opacity-0 group-hover:opacity-100 transition-all" title="复制 ID">
                                <i data-lucide="copy" class="w-4 h-4"></i>
                            </button>` : ''}
                        </div>
                    `;
                    listDiv.appendChild(div);
                });
                lucide.createIcons();
            } catch(e) {
                listDiv.innerHTML = '<div class="text-center py-10 text-red-400">加载失败</div>';
            }
        }

        function refreshFiles() { loadFiles(currentParentId); }

        function renderBreadcrumb() {
            const bDiv = document.getElementById('breadcrumb');
            bDiv.innerHTML = breadcrumbs.map((b, idx) => {
                const isLast = idx === breadcrumbs.length - 1;
                const cls = isLast ? 'font-bold text-slate-800' : 'cursor-pointer hover:text-blue-600';
                const action = isLast ? '' : `onclick="jumpTo(${idx})"`;
                return `<span class="${cls}" ${action}>${b.name}</span>`;
            }).join(' <span class="text-slate-300">/</span> ');
        }

        function jumpTo(idx) {
            const target = breadcrumbs[idx];
            breadcrumbs = breadcrumbs.slice(0, idx + 1);
            currentParentId = target.id;
            renderBreadcrumb();
            loadFiles(target.id);
        }

        function copyFileId(id) {
            navigator.clipboard.writeText(id).then(() => {
                alert('文件 ID 已复制: ' + id);
            });
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        async function updateAdmin() {
            const u = document.getElementById('newAdminUser').value;
            const p = document.getElementById('newAdminPass').value;
            if(!u || !p) return;
            await fetch('/api/password', { method: 'POST', body: JSON.stringify({username:u, password:p}) });
            alert('修改成功，请重新登录'); logout();
        }

        function logout() { localStorage.removeItem('isAuth'); location.reload(); }
    </script>
</body>
</html>
